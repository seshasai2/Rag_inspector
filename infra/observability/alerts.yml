groups:
  - name: raginspector
    rules:
      - alert: BackendDown
        expr: up{job="raginspector-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RAGInspector API scrape target is down"

      - alert: HighAnalysisBacklog
        expr: raginspector_analysis_backlog > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Analysis job backlog is elevated (>100)"

      - alert: HighHttpErrorRate
        expr: |
          (
            sum(rate(raginspector_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(raginspector_http_requests_total[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx rate > 5% over 5 minutes"

      - alert: HighHttpLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(raginspector_http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p99 latency > 2s for 10 minutes"

      - alert: JwtDenylistFailOpen
        expr: increase(raginspector_jwt_denylist_failopen_total[15m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Access-token denylist failing open (Redis unavailable) — revoke is TTL-bounded only"

      - alert: HostHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU > 90% for 10 minutes"

      - alert: HostLowMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host available memory < 10%"
