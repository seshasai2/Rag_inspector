# Production Compose — no host bind mounts, resource limits, restart policies.
# Usage:
#   cp .env.production.example .env.production   # fill secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#   docker compose -f docker-compose.prod.yml --env-file .env.production run --rm backend alembic upgrade head
#
# See docs/DEPLOYMENT.md and docs/COMPOSE_PROD.md

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raginspector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-raginspector}
  DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-raginspector}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-raginspector}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
  HF_API_TOKEN: ${HF_API_TOKEN:-}
  HF_MODEL: ${HF_MODEL:-HuggingFaceH4/zephyr-7b-beta}
  EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-all-MiniLM-L6-v2}
  NLI_MODEL_NAME: ${NLI_MODEL_NAME:-cross-encoder/nli-deberta-v3-small}
  WARM_ML_MODELS_ON_WORKER_START: ${WARM_ML_MODELS_ON_WORKER_START:-true}
  DASHBOARD_METRICS_CACHE_ENABLED: ${DASHBOARD_METRICS_CACHE_ENABLED:-true}
  DASHBOARD_METRICS_CACHE_TTL_SECONDS: ${DASHBOARD_METRICS_CACHE_TTL_SECONDS:-30}
  RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
  RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
  RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
  RAZORPAY_PLAN_STARTER_MONTHLY: ${RAZORPAY_PLAN_STARTER_MONTHLY:-}
  RAZORPAY_PLAN_STARTER_ANNUAL: ${RAZORPAY_PLAN_STARTER_ANNUAL:-}
  RAZORPAY_PLAN_PRO_MONTHLY: ${RAZORPAY_PLAN_PRO_MONTHLY:-}
  RAZORPAY_PLAN_PRO_ANNUAL: ${RAZORPAY_PLAN_PRO_ANNUAL:-}
  RAZORPAY_PLAN_ENTERPRISE_MONTHLY: ${RAZORPAY_PLAN_ENTERPRISE_MONTHLY:-}
  RAZORPAY_PLAN_ENTERPRISE_ANNUAL: ${RAZORPAY_PLAN_ENTERPRISE_ANNUAL:-}
  FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SUPPORT_ADMIN_EMAILS: ${SUPPORT_ADMIN_EMAILS:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-noreply@raginspector.com}
  ENVIRONMENT: production
  REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
  OPS_SHARED_TOKEN: ${OPS_SHARED_TOKEN:?OPS_SHARED_TOKEN is required}
  PORT: "8000"
  UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}

services:
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile.db
    image: raginspector-db:prod
    container_name: raginspector_prod_db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raginspector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-raginspector}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Not published — only reachable on the compose network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raginspector}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: raginspector_prod_redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: raginspector-backend:prod
    container_name: raginspector_prod_backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *backend-env
    # Image code only — no ./backend bind mount
    volumes:
      - model_cache:/app/.cache/huggingface
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/ops/ready >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: raginspector-backend:prod
    container_name: raginspector_prod_worker
    restart: unless-stopped
    logging: *default-logging
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 -Q analysis,celery
    environment:
      <<: *backend-env
    volumes:
      - model_cache:/app/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -t 5 2>/dev/null | grep -qi pong",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "0.50"
          memory: 1G

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: raginspector-backend:prod
    container_name: raginspector_prod_beat
    restart: unless-stopped
    logging: *default-logging
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; r=redis.from_url(os.environ['REDIS_URL']); r.ping()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  postgres_backup:
    image: postgres:16-alpine
    container_name: raginspector_prod_backup
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-raginspector}
      POSTGRES_DB: ${POSTGRES_DB:-raginspector}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - postgres_backups:/backups
    command: >
      sh -c 'while true; do
        ts=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h db -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "/backups/raginspector_$$ts.sql.gz";
        find /backups -type f -name "*.sql.gz" -mtime +"$$BACKUP_RETENTION_DAYS" -delete;
        sleep 86400;
      done'
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 64M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
    image: raginspector-frontend:prod
    container_name: raginspector_prod_frontend
    restart: unless-stopped
    logging: *default-logging
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: raginspector-nginx:prod
    container_name: raginspector_prod_nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  model_cache:
