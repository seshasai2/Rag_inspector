# Keep Render Free web service awake via periodic health pings.
# Requires repository secret BACKEND_URL (e.g. https://your-service.onrender.com)
# — no trailing slash. Never commit the URL with credentials.

name: Render keep-alive

on:
  schedule:
    # Every 5 minutes — Free tier can 502 during cold start; keep-alive must be denser
    # than the ~15 min idle spin-down. GitHub cron can also drift, so 5m is safer.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    name: Ping /health
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require BACKEND_URL secret
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "::error::Repository secret BACKEND_URL is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            echo "Example value: https://your-service.onrender.com"
            exit 1
          fi
          # Normalize: strip trailing slash for safe path join
          BACKEND_URL="${BACKEND_URL%/}"
          echo "BACKEND_URL=${BACKEND_URL}" >> "$GITHUB_ENV"

      - name: GET /health
        id: health
        run: |
          set -euo pipefail
          URL="${BACKEND_URL}/health"
          echo "UTC time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Target:   ${URL}"

          BODY_FILE="$(mktemp)"
          HTTP_CODE="000"
          START_NS=$(date +%s%N)

          set +e
          HTTP_CODE=$(curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            --write-out "%{http_code}" \
            --output "${BODY_FILE}" \
            "${URL}")
          CURL_EXIT=$?
          set -e

          END_NS=$(date +%s%N)
          ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))

          echo "Status code: ${HTTP_CODE}"
          echo "Response time (ms): ${ELAPSED_MS}"
          echo "Response body:"
          cat "${BODY_FILE}" || true
          echo

          if [ "${CURL_EXIT}" -ne 0 ] || [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::Keep-alive ping failed (curl_exit=${CURL_EXIT}, http=${HTTP_CODE})"
            exit 1
          fi
