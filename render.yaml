# Render Blueprint — free portfolio deploy (no Render Postgres, no Upstash required).
# Repo: https://github.com/seshasai2/Rag_inspector
#
# Free-tier constraints this file assumes:
# - You already used your 1 free Render Postgres → paste its External URL below
# - Upstash unavailable → this deploy runs WITHOUT Redis (seed UI demo only)
#
# ENVIRONMENT=development skips production Redis fail-closed checks.
# Health check is /live (works without Redis). Live Celery analysis needs Redis later.
#
# Optional Redis later (free Redis Cloud): https://redis.io/try-free/
# Then set REDIS_URL and ENVIRONMENT=production, FRONTEND_URL=https://your.vercel.app
#
# Seed: Render Shell → python scripts/seed_demo.py
# Login: demo@example.com / DemoPass123!

services:
  - type: web
    name: raginspector-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /live
    envVars:
      # development = portfolio/interview without Redis/SaaS keys
      - key: ENVIRONMENT
        value: development
      - key: UVICORN_WORKERS
        value: "1"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: WARM_ML_MODELS_ON_WORKER_START
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: OPS_SHARED_TOKEN
        generateValue: true
      # Update to your real Vercel URL after frontend deploy (CORS)
      - key: FRONTEND_URL
        value: https://raginspector.vercel.app
      - key: ALLOWED_HOSTS
        value: raginspector-api.onrender.com,localhost,127.0.0.1
      # REQUIRED — existing Render Postgres External URL (or Neon)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SYNC_URL
        sync: false
      # Leave empty for seed-only demo (no Upstash). Optional later: Redis Cloud URL
      - key: REDIS_URL
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
