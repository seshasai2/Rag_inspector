# Render Blueprint — free portfolio deploy (API + Postgres only).
# Repo: https://github.com/sesh813/Rag_inspector
# Docs: docs/DEPLOYMENT.md
#
# 1. Create free Redis (Upstash) and paste REDIS_URL below after first apply.
# 2. Apply Blueprint from Render dashboard (link this GitHub repo).
# 3. Deploy Vercel frontend (Root Directory: frontend).
# 4. Set FRONTEND_URL to your Vercel HTTPS URL and redeploy the API.
#
# Seed demo (Render Shell on the web service):
#   python scripts/seed_demo.py
# Login: demo@example.com / DemoPass123!

databases:
  - name: raginspector-db
    plan: free
    databaseName: raginspector
    user: raginspector

services:
  - type: web
    name: raginspector-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: UVICORN_WORKERS
        value: "1"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: WARM_ML_MODELS_ON_WORKER_START
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: OPS_SHARED_TOKEN
        generateValue: true
      # Temporary until Vercel URL exists — update after frontend deploy
      - key: FRONTEND_URL
        value: https://raginspector.vercel.app
      - key: ALLOWED_HOSTS
        value: raginspector-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: raginspector-db
          property: connectionString
      - key: DATABASE_SYNC_URL
        fromDatabase:
          name: raginspector-db
          property: connectionString
      # REQUIRED — create at https://upstash.com (free Redis) and paste redis:// or rediss:// URL
      - key: REDIS_URL
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
