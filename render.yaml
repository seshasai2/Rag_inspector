# Render Blueprint — free portfolio deploy (web service only).
# Repo: https://github.com/seshasai2/Rag_inspector
#
# Free Render allows only ONE Postgres. This blueprint does NOT create a database.
# Provide DATABASE_URL + DATABASE_SYNC_URL from either:
#   A) Your existing Render Postgres (Dashboard → that DB → Connections → External)
#   B) Free Neon: https://console.neon.tech  (connection string)
#
# Also required: REDIS_URL from Upstash (https://console.upstash.com)
#
# After deploy, set FRONTEND_URL to your Vercel HTTPS URL and redeploy.
# Seed: Render Shell → python scripts/seed_demo.py
# Login: demo@example.com / DemoPass123!

services:
  - type: web
    name: raginspector-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: UVICORN_WORKERS
        value: "1"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: WARM_ML_MODELS_ON_WORKER_START
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: OPS_SHARED_TOKEN
        generateValue: true
      # Update after Vercel deploy
      - key: FRONTEND_URL
        value: https://raginspector.vercel.app
      - key: ALLOWED_HOSTS
        value: raginspector-api.onrender.com
      # Paste from existing Render Postgres OR Neon (External URL)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SYNC_URL
        sync: false
      # Paste from Upstash
      - key: REDIS_URL
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
