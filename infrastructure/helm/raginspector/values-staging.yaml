# Staging — externalized secrets preferred; modest HA.
# Pre-create Secret `raginspector-secrets` with DATABASE_*, REDIS_URL, SECRET_KEY.

namespace:
  create: true
  name: raginspector-staging

config:
  ENVIRONMENT: staging
  REQUIRE_EMAIL_VERIFICATION: "true"
  FRONTEND_URL: "https://staging.app.example.com"
  ALLOWED_HOSTS: "staging.api.example.com"
  NEXT_PUBLIC_API_URL: "https://staging.api.example.com"

secret:
  create: false
  name: raginspector-secrets

postgresql:
  enabled: false

redis:
  enabled: false

external:
  # Prefer putting full URLs in the Secret; leave empty here when secret holds them.
  databaseUrl: ""
  databaseSyncUrl: ""
  redisUrl: ""

backend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6

frontend:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4

worker:
  replicaCount: 1
  concurrency: 2
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: staging.app.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: staging.api.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: raginspector-staging-tls
      hosts:
        - staging.app.example.com
        - staging.api.example.com

networkPolicy:
  enabled: true
  allowExternalEgress: true

observability:
  serviceMonitor:
    enabled: true
  prometheusRules:
    enabled: true
  stack:
    enabled: false
