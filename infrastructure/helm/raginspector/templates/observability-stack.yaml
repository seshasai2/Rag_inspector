{{- if .Values.observability.stack.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "raginspector.fullname" . }}-prometheus-config
  namespace: {{ include "raginspector.namespace" . }}
  labels:
    {{- include "raginspector.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: raginspector-backend
        metrics_path: /api/v1/ops/metrics
        static_configs:
          - targets:
              - {{ include "raginspector.fullname" . }}-backend:{{ .Values.backend.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "raginspector.fullname" . }}-prometheus
  namespace: {{ include "raginspector.namespace" . }}
  labels:
    {{- include "raginspector.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "raginspector.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "raginspector.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=15d
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "raginspector.fullname" . }}-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "raginspector.fullname" . }}-prometheus
  namespace: {{ include "raginspector.namespace" . }}
  labels:
    {{- include "raginspector.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  ports:
    - port: 9090
      targetPort: http
      name: http
  selector:
    {{- include "raginspector.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "raginspector.fullname" . }}-grafana
  namespace: {{ include "raginspector.namespace" . }}
  labels:
    {{- include "raginspector.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "raginspector.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "raginspector.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "raginspector.secretName" . }}
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "raginspector.fullname" . }}-grafana
  namespace: {{ include "raginspector.namespace" . }}
  labels:
    {{- include "raginspector.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  ports:
    - port: 3000
      targetPort: http
      name: http
  selector:
    {{- include "raginspector.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- end }}
