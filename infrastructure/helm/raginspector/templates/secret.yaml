{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "raginspector.secretName" . }}
  namespace: {{ include "raginspector.namespace" . }}
  labels:
    {{- include "raginspector.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secret.stringData.SECRET_KEY is required when secret.create=true" .Values.secret.stringData.SECRET_KEY | quote }}
  DATABASE_URL: {{ include "raginspector.databaseUrl" . | quote }}
  DATABASE_SYNC_URL: {{ include "raginspector.databaseSyncUrl" . | quote }}
  REDIS_URL: {{ include "raginspector.redisUrl" . | quote }}
  {{- if .Values.secret.stringData.OPS_SHARED_TOKEN }}
  OPS_SHARED_TOKEN: {{ .Values.secret.stringData.OPS_SHARED_TOKEN | quote }}
  {{- end }}
  {{- if .Values.secret.stringData.HF_API_TOKEN }}
  HF_API_TOKEN: {{ .Values.secret.stringData.HF_API_TOKEN | quote }}
  {{- end }}
  {{- if .Values.secret.stringData.SENTRY_DSN }}
  SENTRY_DSN: {{ .Values.secret.stringData.SENTRY_DSN | quote }}
  {{- end }}
  {{- if .Values.secret.stringData.SMTP_PASSWORD }}
  SMTP_PASSWORD: {{ .Values.secret.stringData.SMTP_PASSWORD | quote }}
  {{- end }}
  {{- if .Values.secret.stringData.RESEND_API_KEY }}
  RESEND_API_KEY: {{ .Values.secret.stringData.RESEND_API_KEY | quote }}
  {{- end }}
  {{- if .Values.secret.stringData.RAZORPAY_KEY_SECRET }}
  RAZORPAY_KEY_SECRET: {{ .Values.secret.stringData.RAZORPAY_KEY_SECRET | quote }}
  {{- end }}
  {{- if .Values.secret.stringData.RAZORPAY_WEBHOOK_SECRET }}
  RAZORPAY_WEBHOOK_SECRET: {{ .Values.secret.stringData.RAZORPAY_WEBHOOK_SECRET | quote }}
  {{- end }}
{{- end }}
