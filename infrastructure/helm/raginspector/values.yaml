# Default values — override per environment (values-development / staging / production).
# Assumptions documented in docs/AUTOSCALING.md and docs/KUBERNETES.md.

nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  # Cloud-agnostic; leave empty for any cluster.
  storageClass: ""

namespace:
  create: true
  name: raginspector

image:
  backend:
    repository: raginspector-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  frontend:
    repository: raginspector-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automount: false

# Pod-level security (OpenShift-compatible: runAsNonRoot, no privileged).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Non-secret configuration → ConfigMap
config:
  ENVIRONMENT: production
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  REQUIRE_EMAIL_VERIFICATION: "true"
  DASHBOARD_METRICS_CACHE_ENABLED: "true"
  DASHBOARD_METRICS_CACHE_TTL_SECONDS: "30"
  WARM_ML_MODELS_ON_WORKER_START: "true"
  EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
  NLI_MODEL_NAME: cross-encoder/nli-deberta-v3-small
  OLLAMA_MODEL: "llama3.2:3b"
  HF_MODEL: HuggingFaceH4/zephyr-7b-beta
  SMTP_PORT: "587"
  SMTP_FROM: noreply@raginspector.com
  # Set via values-* for real hosts
  FRONTEND_URL: "https://app.example.com"
  ALLOWED_HOSTS: "api.example.com"
  NEXT_PUBLIC_API_URL: "https://api.example.com"
  OLLAMA_BASE_URL: ""

# Secret keys expected in existing Secret (when secret.create=false) or created from values.
# Prefer External Secrets / sealed secrets in real clusters — see docs/SECRETS.md
secret:
  create: false
  name: raginspector-secrets
  # Only used when create=true (dev/staging local). Never commit real values.
  stringData: {}

# External dependency URLs (ConfigMap + Secret prefer split; URLs with passwords go in Secret).
# When postgresql/redis.enabled, chart injects in-cluster URLs automatically.
external:
  # Leave empty when using chart postgres/redis
  databaseUrl: ""
  databaseSyncUrl: ""
  redisUrl: ""

backend:
  enabled: true
  replicaCount: 2
  command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  # Meaningful probes: live = process; ready = DB+Redis; startup = grace for ML-free API
  probes:
    startup:
      path: /live
      failureThreshold: 30
      periodSeconds: 5
    liveness:
      path: /live
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /api/v1/ops/ready
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    # Stabilize scale-down to reduce oscillation
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 50
            periodSeconds: 30
  pdb:
    enabled: true
    minAvailable: 1
  nodeSelector: {}
  affinity: {}
  tolerations: []
  extraEnv: []
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: cache
      mountPath: /app/.cache
  volumes:
    - name: tmp
      emptyDir: {}
    - name: cache
      emptyDir: {}

frontend:
  enabled: true
  replicaCount: 2
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    startup:
      path: /
      failureThreshold: 20
      periodSeconds: 5
    liveness:
      path: /
      periodSeconds: 20
    readiness:
      path: /
      periodSeconds: 10
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  nodeSelector: {}
  affinity: {}
  tolerations: []

worker:
  enabled: true
  replicaCount: 1
  concurrency: 2
  queues: "analysis,celery"
  resources:
    # ML models (sentence-transformers) dominate memory
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 6Gi
  probes:
    # Celery has no HTTP; use exec ping
    liveness:
      enabled: true
      initialDelaySeconds: 90
      periodSeconds: 30
      timeoutSeconds: 15
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    # Optional KEDA queue depth (requires metrics-server / KEDA install)
  pdb:
    enabled: true
    minAvailable: 1
  persistence:
    modelCache:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  nodeSelector: {}
  affinity: {}
  tolerations: []

beat:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  nodeSelector: {}
  affinity: {}
  tolerations: []

# In-cluster Postgres — DEVELOPMENT ONLY. Production: managed Postgres (Cloud SQL, RDS, Azure PG).
postgresql:
  enabled: false
  image: pgvector/pgvector:pg16
  auth:
    username: raginspector
    password: "" # required when enabled — set in values, never in git
    database: raginspector
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# In-cluster Redis — prefer managed Redis in production.
redis:
  enabled: false
  image: redis:7-alpine
  auth:
    password: "" # required when enabled
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: raginspector-tls
      hosts:
        - app.example.com
        - api.example.com

networkPolicy:
  enabled: true
  # Restrictive: frontend→backend; backend/worker/beat→postgres+redis; ingress→fe+api
  allowExternalEgress: true # DNS + HTTPS for LLM providers; set false for air-gapped with explicit CIDRs

observability:
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /api/v1/ops/metrics
    # When OPS_SHARED_TOKEN set, scrape uses bearer from secret key ops-shared-token
    bearerTokenSecret:
      enabled: false
      key: OPS_SHARED_TOKEN
  prometheusRules:
    enabled: false
  # Optional in-chart Prometheus/Grafana (for lab clusters). Prefer cluster monitoring in prod.
  stack:
    enabled: false

keda:
  enabled: false
  worker:
    # Scale workers on analysis queue depth via Prometheus metric
    metricName: raginspector_celery_queue_depth
    threshold: "25"
    prometheusAddress: http://prometheus-operated.monitoring.svc:9090

migration:
  # Helm hook Job: alembic upgrade head before upgrade completes
  enabled: true
  backoffLimit: 3
  activeDeadlineSeconds: 600

deploymentValidation:
  # Post-install Job that fails the release if /ops/ready is not 200
  enabled: true
