# Production — managed Postgres/Redis, NetworkPolicies, HPA, PDBs, TLS Ingress.
# REQUIRED: create Secret before install (see docs/SECRETS.md). Never set secret.create=true
# with real values in git.

namespace:
  create: true
  name: raginspector

config:
  ENVIRONMENT: production
  REQUIRE_EMAIL_VERIFICATION: "true"
  FRONTEND_URL: "https://app.example.com"
  ALLOWED_HOSTS: "api.example.com"
  NEXT_PUBLIC_API_URL: "https://api.example.com"

secret:
  create: false
  name: raginspector-secrets

postgresql:
  enabled: false

redis:
  enabled: false

backend:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 75
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  pdb:
    enabled: true
    minAvailable: 2

frontend:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
  pdb:
    enabled: true
    minAvailable: 2

worker:
  replicaCount: 2
  concurrency: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
  persistence:
    modelCache:
      enabled: true
      size: 20Gi
  resources:
    requests:
      cpu: 1
      memory: 3Gi
    limits:
      cpu: "4"
      memory: 8Gi
  pdb:
    enabled: true
    minAvailable: 1

beat:
  enabled: true
  replicaCount: 1

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Optional cert-manager
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: raginspector-tls
      hosts:
        - app.example.com
        - api.example.com

networkPolicy:
  enabled: true
  allowExternalEgress: true

observability:
  serviceMonitor:
    enabled: true
    bearerTokenSecret:
      enabled: true
      key: OPS_SHARED_TOKEN
  prometheusRules:
    enabled: true
  stack:
    enabled: false

keda:
  enabled: false

migration:
  enabled: true

deploymentValidation:
  enabled: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
