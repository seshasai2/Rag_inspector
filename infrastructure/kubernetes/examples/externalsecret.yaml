# Future-ready External Secrets Operator example (not applied by Helm).
# Docs: docs/SECRETS.md
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: raginspector-secrets
  namespace: raginspector
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: raginspector-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: raginspector/production
        property: secret_key
    - secretKey: DATABASE_URL
      remoteRef:
        key: raginspector/production
        property: database_url
    - secretKey: DATABASE_SYNC_URL
      remoteRef:
        key: raginspector/production
        property: database_sync_url
    - secretKey: REDIS_URL
      remoteRef:
        key: raginspector/production
        property: redis_url
    - secretKey: OPS_SHARED_TOKEN
      remoteRef:
        key: raginspector/production
        property: ops_shared_token
